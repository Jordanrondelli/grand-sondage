<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tournage — Régie</title>
  <link rel="stylesheet" href="/css/style.css?v=6">
  <link rel="stylesheet" href="/css/tournage.css?v=9">
</head>
<body>
  <div id="screen-login" class="screen active">
    <div class="login-screen">
      <div class="emoji">🎬</div>
      <h2>Mode Tournage</h2>
      <input type="password" class="login-input" id="login-pw" placeholder="Mot de passe admin">
      <div class="login-err" id="login-err"></div>
      <button class="btn-enter" id="btn-login">Accéder</button>
    </div>
  </div>

  <div id="screen-control" class="screen" style="display:none">
    <!-- Top bar -->
    <div class="regie-topbar">
      <div class="regie-topbar-left">
        <span class="regie-logo">🎬</span>
        <span class="regie-title">Régie</span>
        <span class="regie-status" id="regie-status">En attente</span>
      </div>
      <div class="regie-topbar-right">
        <a href="/tournage/display" target="_blank" class="regie-btn-display">
          <span class="regie-btn-display-dot"></span>
          Ouvrir l'écran plateau
        </a>
      </div>
    </div>

    <!-- Main layout -->
    <div class="regie-layout">
      <!-- Left panel: clubs + questions -->
      <div class="regie-left">
        <div class="regie-panel">
          <div class="regie-panel-header">Clubs</div>
          <div class="club-grid" id="club-selector"></div>
        </div>

        <div class="regie-panel" id="questions-panel" style="display:none">
          <div class="regie-panel-header">
            <span>Questions</span>
            <button class="regie-btn-import" id="btn-import-csv">+ Importer CSV</button>
          </div>
          <div class="tq-list" id="tq-list"></div>
          <input type="file" id="csv-file-input" accept=".csv,.txt" style="display:none">
        </div>
      </div>

      <!-- Right panel: active question + answers + controls -->
      <div class="regie-right">
        <div class="regie-panel regie-active-panel" id="answer-section" style="display:none">
          <!-- Question header -->
          <div class="regie-q-header">
            <div class="regie-q-label">Question active</div>
            <div class="regie-q-title" id="selected-q-label"></div>
          </div>

          <!-- Answer input row -->
          <div class="regie-answer-input-row">
            <input class="regie-answer-input" id="custom-answer-input" placeholder="Écrire la réponse du joueur...">
            <button class="regie-btn-send" id="btn-show-answer">Afficher</button>
          </div>

          <!-- Action bar -->
          <div class="regie-actions" id="action-buttons" style="display:none">
            <button class="regie-btn-action regie-btn-reveal" id="btn-reveal-score">
              <span class="regie-btn-icon">🎯</span>
              Dévoiler le score
            </button>
            <button class="regie-btn-action regie-btn-hors" id="btn-hors-panel">
              <span class="regie-btn-icon">✕</span>
              Hors panel
            </button>
            <button class="regie-btn-action regie-btn-reset" id="btn-reset-display">
              <span class="regie-btn-icon">↺</span>
              Reset
            </button>
          </div>

          <!-- Answers grid -->
          <div class="regie-answers-header">
            <span>Réponses du panel</span>
            <span class="regie-answers-count" id="answers-count"></span>
          </div>
          <div class="regie-answers-grid" id="answers-grid"></div>
        </div>

        <!-- Empty state when no question selected -->
        <div class="regie-panel regie-empty-state" id="empty-state">
          <div class="regie-empty-icon">📋</div>
          <div class="regie-empty-text">Sélectionnez un club puis une question pour commencer</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Import modal -->
  <div class="modal-overlay" id="import-modal" style="display:none">
    <div class="modal-box">
      <h3>Importer le CSV</h3>
      <p class="modal-info" id="modal-info"></p>
      <div class="modal-name-row">
        <label class="modal-label">Nom de la question</label>
        <input class="modal-name-input" id="modal-name-input" placeholder="Nom de la question...">
      </div>
      <div class="modal-actions">
        <button class="btn-modal" id="btn-import-asis">Importer tel quel</button>
        <button class="btn-modal btn-modal-alt" id="btn-import-rescale">Ramener sur 100</button>
        <button class="btn-modal btn-modal-cancel" id="btn-import-cancel">Annuler</button>
      </div>
    </div>
  </div>

  <script src="/js/tournage.js?v=9"></script>
</body>
</html>
