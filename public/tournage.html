<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tournage — Régie</title>
  <link rel="stylesheet" href="/css/style.css?v=6">
  <link rel="stylesheet" href="/css/tournage.css?v=3">
</head>
<body>
  <div id="screen-login" class="screen active">
    <div class="login-screen">
      <div class="emoji">🎬</div>
      <h2>Mode Tournage</h2>
      <input type="password" class="login-input" id="login-pw" placeholder="Mot de passe admin">
      <div class="login-err" id="login-err"></div>
      <button class="btn-enter" id="btn-login">Accéder</button>
    </div>
  </div>

  <div id="screen-control" class="screen" style="display:none">
    <div class="control-wrap">
      <div class="control-header">
        <h1>🎬 Régie</h1>
        <a href="/tournage/display" target="_blank" class="btn-open-display">📺 Ouvrir l'affichage</a>
      </div>

      <!-- Categories -->
      <div class="control-section">
        <div class="control-label">Club</div>
        <div class="club-selector" id="club-selector"></div>
      </div>

      <!-- Questions list for selected category -->
      <div class="control-section" id="questions-section" style="display:none">
        <div class="control-label">Questions importées</div>
        <div class="tq-list" id="tq-list"></div>
        <button class="btn-import" id="btn-import-csv">📥 Importer une question (CSV)</button>
        <input type="file" id="csv-file-input" accept=".csv,.txt" style="display:none">
      </div>

      <!-- Selected question: answer input + panel -->
      <div class="control-section" id="answer-section" style="display:none">
        <div class="control-label" id="selected-q-label">Réponse</div>

        <div class="custom-answer-row">
          <input class="custom-answer-input" id="custom-answer-input" placeholder="Écrire la réponse du joueur...">
          <button class="btn-custom-send" id="btn-show-answer">📺 Afficher</button>
        </div>

        <div class="action-buttons" id="action-buttons" style="display:none">
          <button class="btn-reveal" id="btn-reveal-score">🎯 Dévoiler le score</button>
          <button class="btn-hors-panel" id="btn-hors-panel">❌ Hors panel</button>
          <button class="btn-reset-display" id="btn-reset-display">🔄 Reset</button>
        </div>

        <div class="control-label" style="margin-top:20px">Réponses du panel</div>
        <div class="answers-grid" id="answers-grid"></div>
      </div>
    </div>
  </div>

  <!-- Import modal -->
  <div class="modal-overlay" id="import-modal" style="display:none">
    <div class="modal-box">
      <h3>Importer le CSV</h3>
      <p class="modal-info" id="modal-info"></p>
      <div class="modal-actions">
        <button class="btn-modal" id="btn-import-asis">Importer tel quel</button>
        <button class="btn-modal btn-modal-alt" id="btn-import-rescale">Ramener sur 100</button>
        <button class="btn-modal btn-modal-cancel" id="btn-import-cancel">Annuler</button>
      </div>
    </div>
  </div>

  <script src="/js/tournage.js?v=4"></script>
</body>
</html>
